# EquipmentManagement 环境配置文件
# 迁移时只需修改这个文件

# ==================== 应用配置 ====================
APP_NAME="EquipmentManagement"
APP_PORT=5000
WEBHOOK_PORT=5001
GUNICORN_WORKERS=2

# ==================== 目录配置 ====================
APP_DIR="/data/EquipmentManagement"
LOG_DIR="/var/log/dms"

# ==================== Git 配置 ====================
GIT_REPO="https://github.com/feng197907/EquipmentManagement"
GIT_BRANCH="main"

# ==================== Python 配置 ====================
PYTHON_PATH="/usr/bin/python3"
VENV_PATH=""

# ==================== 系统服务配置 ====================
SYSTEMD_SERVICE_NAME="dms"
SYSTEMD_WEBHOOK_NAME="dms-webhook"

# ==================== 数据库配置（如果有） ====================
# 迁移后默认切换到 MySQL；如需回退 SQLite，将 DB_TYPE 改为 sqlite
DB_TYPE="mysql"
MYSQL_HOST="127.0.0.1"
MYSQL_PORT=3306
MYSQL_DATABASE="dms_db"
MYSQL_USER="dms_user"
MYSQL_PASSWORD="your_password"
