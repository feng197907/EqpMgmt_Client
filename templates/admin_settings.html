{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h1>系统设置</h1>
        <p class="page-subtitle">配置系统功能和流程</p>
    </div>
</div>

<div class="settings-container">
    <form method="POST" class="settings-form">
        <!-- 审批流程设置 -->
        <div class="settings-section">
            <div class="settings-section-header">
                <i data-lucide="clipboard-check"></i>
                <h2>审批流程设置</h2>
            </div>
            <div class="settings-section-body">
                {% for key, config in settings_config.items() %}
                <div class="setting-item">
                    <div class="setting-info">
                        <div class="setting-label">{{ config.label }}</div>
                        <div class="setting-description">{{ config.description }}</div>
                    </div>
                    <div class="setting-control">
                        {% if config.type == 'boolean' %}
                        <label class="toggle-switch">
                            <input type="checkbox" name="{{ key }}" {% if settings[key].setting_value == 'true' %}checked{% endif %}>
                            <span class="toggle-slider"></span>
                        </label>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save"></i>
                保存设置
            </button>
        </div>
    </form>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/admin-settings.css') }}">
{% endblock %}
