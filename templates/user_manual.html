{% extends 'base.html' %}

{% block title %}{{ manual_title }} - DMS{% endblock %}

{% block head %}
<style>
  .manual-page {
    padding: 24px 28px 36px;
  }

  .manual-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 20px;
  }

  .manual-title {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text-primary);
  }

  .manual-subtitle {
    margin: 0.4rem 0 0;
    color: var(--text-secondary);
  }

  .manual-card {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    overflow: hidden;
  }

  .manual-content {
    padding: 28px 32px;
    line-height: 1.85;
    color: var(--text-primary);
    word-break: break-word;
  }

  .manual-content h1,
  .manual-content h2,
  .manual-content h3,
  .manual-content h4 {
    margin-top: 1.6rem;
    margin-bottom: 0.8rem;
    font-weight: 800;
  }

  .manual-content h1 {
    font-size: 2rem;
  }

  .manual-content h2 {
    font-size: 1.5rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.45rem;
  }

  .manual-content p,
  .manual-content li,
  .manual-content blockquote,
  .manual-content table {
    margin-bottom: 0.9rem;
  }

  .manual-content table {
    width: 100%;
    border-collapse: collapse;
  }

  .manual-content th,
  .manual-content td {
    border: 1px solid var(--border-color);
    padding: 10px 12px;
    vertical-align: top;
  }

  .manual-content th {
    background: #f8fafc;
    font-weight: 700;
  }

  .manual-content pre {
    overflow: auto;
    padding: 16px;
    border-radius: 14px;
    background: #0f172a;
    color: #e2e8f0;
  }

  .manual-content code {
    padding: 0.15rem 0.35rem;
    border-radius: 6px;
    background: #f1f5f9;
    color: #0f172a;
  }

  .manual-content pre code {
    padding: 0;
    background: transparent;
    color: inherit;
  }

  .manual-content blockquote {
    padding: 12px 16px;
    border-left: 4px solid var(--color-primary);
    background: #f8fbff;
    color: var(--text-secondary);
  }

  @media (max-width: 768px) {
    .manual-page {
      padding: 16px;
    }

    .manual-content {
      padding: 20px 18px;
    }

    .manual-header {
      flex-direction: column;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="manual-page">
  <div class="manual-header">
    <div>
      <h1 class="manual-title">{{ manual_title }}</h1>
      <p class="manual-subtitle">点击顶部“用户手册”按钮可随时回到此页面，内容直接来自 docs/使用手册.md</p>
    </div>
    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-primary">
      <i data-lucide="layout-grid"></i>
      返回看板
    </a>
  </div>

  <div class="manual-card">
    <div class="manual-content markdown-body">
      {{ manual_html|safe }}
    </div>
  </div>
</div>
{% endblock %}
